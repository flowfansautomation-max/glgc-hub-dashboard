<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Per Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="roster.js?v=25"></script>
  <script src="model.js?v=25"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --red:#e2574c; --green:#38b26a; --sun:#f5c518; }
    * { box-sizing: border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:14px 22px 60px; }

    .nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px;
      padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }

    .topbar { display:grid; grid-template-columns:repeat(4, auto); gap:10px 14px;
      align-items:center; justify-content:center; margin:8px 0 18px; }
    .topbar .label { color:#999; font-size:13px; text-align:right; }
    select { background:#111; color:#fff; border:1px solid #333; border-radius:8px;
      padding:9px 12px; font-size:15px; min-width:230px; }
    select:disabled { opacity:0.4; }

    /* header — photo left, name + choir centred, membership badge right */
    .header { position:relative; text-align:center; padding:6px 168px; min-height:118px; }
    .avatar, .initials { position:absolute; top:0; left:0; width:112px; height:112px;
      border-radius:50%; border:3px solid #6a6a6a; }
    .avatar { object-fit:cover; background:#1a1a1a; }
    .initials { background:linear-gradient(135deg,#3a3a3a,#5a5a5a); display:flex;
      align-items:center; justify-content:center; font-size:38px; font-weight:bold; }
    .leader { font-size:33px; font-weight:bold; line-height:1.1; }
    .choirName { font-family:Georgia,'Times New Roman',serif; color:var(--gold);
      font-size:27px; letter-spacing:1px; margin-top:6px; text-transform:uppercase; }
    .meta { font-size:15px; color:#bcbcbc; margin-top:8px; }
    .meta b { color:#fff; }
    .membership { position:absolute; top:8px; right:0; background:#161616; border:1px solid #333;
      border-radius:16px; padding:8px 16px; font-size:14px; color:var(--gold); white-space:nowrap; }
    .membership b { color:#fff; font-size:16px; }

    @media (max-width: 820px) {
      .topbar { grid-template-columns:auto 1fr; }
      .header { padding:0; min-height:auto; }
      .avatar, .initials { position:static; margin:12px auto 6px; }
      .membership { position:static; display:inline-block; margin:12px auto 0; }
      .leader { font-size:26px; } .choirName { font-size:21px; }
      select { min-width:0; width:100%; }
    }

    /* chart sections */
    .section { margin-top:26px; }
    .section-label { display:inline-block; background:#161616; border:1px solid #333;
      border-left:4px solid var(--gold); border-radius:8px; padding:8px 18px;
      font-size:17px; font-weight:bold; letter-spacing:.5px; }
    .legend { display:flex; gap:26px; margin:14px 2px 4px; color:#cfcfcf; font-size:15px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:9px; }
    .sw { width:24px; height:13px; border-radius:2px; display:inline-block; }
    .chartbox { height:300px; margin-top:6px; }
    .msg { text-align:center; color:#888; padding:30px; font-size:16px; }
    .note { text-align:center; color:#9a9a9a; padding:46px 22px; font-size:16px; line-height:1.6;
      background:#0c0c0c; border:1px solid #222; border-radius:12px; margin-top:26px; }
    .note b { color:var(--gold); }
    .chart-empty { color:#777; font-size:15px; text-align:center; padding:66px 20px;
      border:1px dashed #2a2a2a; border-radius:12px; margin-top:6px; }

    /* shepherd summary cards */
    .stats { display:flex; gap:14px; justify-content:center; margin:6px 0 2px; flex-wrap:wrap; }
    .stat { background:#0e0e0e; border:1px solid #262626; border-radius:12px; padding:14px 26px;
      text-align:center; min-width:170px; }
    .stat .n { font-size:30px; font-weight:bold; }
    .stat .l { font-size:13px; color:#999; margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html" class="active">Per Hub</a>
      <a href="all.html">All Hubs</a>
      <a href="summary.html">Weekly Summary</a>
    </div>

    <div class="topbar">
      <span class="label">Choir:</span>
      <select id="choir" onchange="onChoir()"></select>
      <span class="label">Governor:</span>
      <select id="gov" onchange="onGov()"></select>
      <span class="label">Shepherd:</span>
      <select id="shep" onchange="render()"></select>
      <span class="label">Month:</span>
      <select id="period" onchange="render()"><option value="all">All months</option></select>
    </div>

    <div class="header">
      <img id="avatar" class="avatar" alt="" style="display:none">
      <div id="initials" class="initials" style="display:none"></div>
      <div class="leader" id="leader">Loading…</div>
      <div class="choirName" id="choirName"></div>
      <div class="meta" id="metaLine"></div>
    </div>

    <!-- shepherd-only summary cards -->
    <div id="shepStats" class="stats" style="display:none"></div>

    <!-- two stacked charts: rehearsal on top, sunday on bottom -->
    <div id="charts">
      <div class="section">
        <div class="section-label">🎼 Rehearsal Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--blue)"></i> <span id="legRehTxt">Rehearsal attendance</span></span>
          <span id="legOff"><i class="sw" style="background:var(--red)"></i> Offering (GHS)</span>
        </div>
        <div class="chartbox" id="rehBox"><canvas id="chartReh"></canvas></div>
        <div class="chart-empty" id="rehEmpty" style="display:none">No rehearsal attendance recorded for this period yet.</div>
      </div>
      <div class="section">
        <div class="section-label">⛪ Sunday Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--sun)"></i> Sunday attendance</span>
        </div>
        <div class="chartbox" id="sunBox"><canvas id="chartSun"></canvas></div>
        <div class="chart-empty" id="sunEmpty" style="display:none">No Sunday attendance recorded for this period yet.</div>
      </div>
    </div>

    <div id="awaiting" class="note" style="display:none"></div>
  </div>

  <script>
    var MODEL = null, chartReh = null, chartSun = null;
    var MONTHS = ['January','February','March','April','May','June','July','August',
                  'September','October','November','December'];
    function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

    // Draws ✓ over "present" bars and a faint – at the base for "absent" (individual charts).
    var tickLabels = {
      id:'tickLabels',
      afterDatasetsDraw:function (chart) {
        var ctx = chart.ctx, ds = chart.data.datasets[0], meta = chart.getDatasetMeta(0);
        meta.data.forEach(function (bar, i) {
          var present = ds.data[i] > 0;
          ctx.save();
          ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
          if (present) { ctx.fillStyle = '#fff'; ctx.fillText('✓', bar.x, bar.y - 8); }
          else { ctx.fillStyle = '#555'; ctx.fillText('–', bar.x, chart.scales.y.getPixelForValue(0) - 8); }
          ctx.restore();
        });
      }
    };

    GLGC.load(function (m) {
      MODEL = m;
      var choir = document.getElementById('choir');
      choir.innerHTML = '<option value="__all">All choirs</option>';
      MODEL.choirs.forEach(function (C) {
        var o = document.createElement('option'); o.value = C.choir; o.textContent = C.choir;
        choir.appendChild(o);
      });
      var period = document.getElementById('period'), seen = {};
      MODEL.weeks.forEach(function (w) {
        var key = w.satDate.getFullYear() + '-' + (w.satDate.getMonth() + 1);
        if (seen[key]) return; seen[key] = true;
        var o = document.createElement('option'); o.value = key;
        o.textContent = MONTHS[w.satDate.getMonth()] + ' ' + w.satDate.getFullYear();
        period.appendChild(o);
      });
      onChoir();
    }, function (e) { document.getElementById('leader').textContent = 'Could not load data'; console.error(e); });

    function onChoir() {
      var choir = document.getElementById('choir').value;
      var gov = document.getElementById('gov');
      gov.innerHTML = '<option value="__all">All governors</option>';
      MODEL.governors
        .filter(function (G) { return choir === '__all' || G.choir === choir; })
        .sort(function (a, b) { return a.governor.localeCompare(b.governor); })
        .forEach(function (G) {
          var o = document.createElement('option'); o.value = G.id; o.textContent = G.governor;
          gov.appendChild(o);
        });
      onGov();
    }

    function onGov() {
      var choir = document.getElementById('choir').value;
      var govId = document.getElementById('gov').value;
      var shep = document.getElementById('shep');
      shep.innerHTML = '<option value="__all">All shepherds</option>';
      MODEL.shepherds.filter(function (s) {
        if (choir !== '__all' && s.choir !== choir) return false;
        if (govId !== '__all' && s.governorId !== govId) return false;
        return true;
      }).forEach(function (s) {
        var o = document.createElement('option'); o.value = s.id; o.textContent = s.name;
        shep.appendChild(o);
      });
      shep.disabled = govId === '__all';
      if (govId === '__all') shep.value = '__all';
      render();
    }

    function selection() {
      var choir = document.getElementById('choir').value;
      var govId = document.getElementById('gov').value;
      var shepId = document.getElementById('shep').value;
      if (shepId !== '__all') return { level:'shepherd', e: MODEL.byId[shepId] };
      if (govId !== '__all')  return { level:'governor', e: MODEL.governors.filter(function(g){return g.id===govId;})[0] };
      if (choir !== '__all')  return { level:'choir',    e: MODEL.choirs.filter(function(c){return c.choir===choir;})[0] };
      return { level:'ministry', e: { points: MODEL.weekly, roster: MODEL.shepherds.length, membership: MODEL.shepherds.length } };
    }

    function keepMonths() {
      var period = document.getElementById('period').value;
      if (period === 'all') return null;
      var p = period.split('-'), yy = +p[0], mo = +p[1] - 1, keep = {};
      MODEL.weeks.forEach(function (w) {
        if (w.satDate.getFullYear() === yy && w.satDate.getMonth() === mo) keep[w.week] = 1;
      });
      return keep;
    }
    function filterWeeks(points) {
      var keep = keepMonths();
      return keep ? points.filter(function (pt) { return keep[pt.week]; }) : points;
    }

    function render() {
      if (!MODEL) return;
      var sel = selection(), e = sel.e;
      var shepStats = document.getElementById('shepStats');
      var legOff = document.getElementById('legOff');

      var name, choirName, meta, key, showMem = false;
      if (sel.level === 'shepherd') {
        name = e.name; choirName = e.choir; key = e.photoKey;
        meta = 'Shepherd  ·  🧭 ' + e.governor + (e.phone ? '  ·  ' + e.phone : '');
      } else if (sel.level === 'governor') {
        name = e.governor; choirName = e.choir; key = slug(e.governor); showMem = true;
        meta = '<b>Hub leader</b>  ·  ' + e.roster + ' shepherds';
      } else if (sel.level === 'choir') {
        name = e.choir; choirName = e.choir; key = slug(e.choir); showMem = true;
        meta = '<b>Whole choir</b>  ·  ' + e.governorIds.length + ' governor' +
               (e.governorIds.length===1?'':'s') + '  ·  ' + e.roster + ' shepherds';
      } else {
        name = 'All Choirs'; choirName = 'Whole Ministry'; key = '__ministry'; showMem = true;
        meta = '<b>Every hub combined</b>  ·  ' + MODEL.choirs.length + ' choirs';
      }
      document.getElementById('leader').textContent = name;
      var cn = document.getElementById('choirName');
      cn.textContent = (choirName && choirName.toUpperCase() !== name.toUpperCase()) ? choirName : '';
      cn.style.display = cn.textContent ? 'block' : 'none';
      document.getElementById('metaLine').innerHTML = meta;

      if (sel.level === 'ministry') {
        document.getElementById('avatar').style.display = 'none';
        var init = document.getElementById('initials'); init.style.display = 'flex'; init.textContent = '★';
      } else {
        GLGC.setAvatar(document.getElementById('avatar'), document.getElementById('initials'), key, name);
      }

      // Every page shows both sections — rehearsal (chart or "no data" note) and
      // Sunday (empty until the per-person Sunday form feeds it).
      document.getElementById('awaiting').style.display = 'none';
      document.getElementById('charts').style.display = 'block';
      shepStats.style.display = 'none';
      legOff.style.display = '';
      document.getElementById('legRehTxt').textContent = 'Rehearsal attendance';
      renderAggregate(filterWeeks(e.points));
    }

    function weekLabels(pts) {
      return pts.map(function (p) { return ['WK ' + p.week, p.label.split('· ')[1] || '']; });
    }

    // Hub / choir / ministry: people counts + offering.
    function toggle(boxId, emptyId, has) {
      document.getElementById(boxId).style.display = has ? '' : 'none';
      document.getElementById(emptyId).style.display = has ? 'none' : 'block';
    }

    function renderAggregate(pts) {
      var labels = weekLabels(pts);
      var peopleAxis = { beginAtZero:true, grace:'14%', position:'left',
        title:{display:true,text:'People',color:'#888'}, ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} };
      var xAxis = { ticks:{color:'#ddd',font:{size:12}}, grid:{color:'#1e1e1e'} };

      var hasReh = pts.some(function(p){ return p.satPresent!=null || p.offering!=null; });
      var hasSun = pts.some(function(p){ return p.sunPresent!=null; });
      toggle('rehBox','rehEmpty',hasReh);
      toggle('sunBox','sunEmpty',hasSun);

      if (chartReh) { chartReh.destroy(); chartReh = null; }
      if (hasReh) chartReh = new Chart(document.getElementById('chartReh'), {
        type:'bar', plugins:[GLGC.valueLabels],
        data:{ labels:labels, datasets:[
          { label:'Rehearsal attendance', data:pts.map(function(p){return p.satPresent;}),
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:38, yAxisID:'y' },
          { label:'Offering (GHS)', data:pts.map(function(p){return p.offering;}),
            backgroundColor:'#e2574c', borderRadius:3, maxBarThickness:38, yAxisID:'y1' }
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ x:xAxis, y:peopleAxis, y1:{ beginAtZero:true, grace:'14%', position:'right',
            title:{display:true,text:'GHS',color:'#888'}, ticks:{color:'#e2574c'}, grid:{drawOnChartArea:false} } } }
      });

      if (chartSun) { chartSun.destroy(); chartSun = null; }
      if (hasSun) chartSun = new Chart(document.getElementById('chartSun'), {
        type:'bar', plugins:[GLGC.valueLabels],
        data:{ labels:labels, datasets:[
          { label:'Sunday attendance', data:pts.map(function(p){return p.sunPresent;}),
            backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:38, yAxisID:'y' }
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ x:xAxis, y:peopleAxis } }
      });
    }

    // Individual shepherd: present/absent (1 / 0) bars per week.
    function renderShepherd(pts) {
      toggle('rehBox','rehEmpty',true); toggle('sunBox','sunEmpty',true);
      var labels = weekLabels(pts);
      var binAxis = { min:0, max:1.15, position:'left', ticks:{ color:'#ddd', stepSize:1,
        callback:function(v){ return v === 1 ? 'Present' : v === 0 ? 'Absent' : ''; } },
        grid:{color:'#1e1e1e'} };
      var xAxis = { ticks:{color:'#ddd',font:{size:12}}, grid:{color:'#1e1e1e'} };

      if (chartReh) chartReh.destroy();
      chartReh = new Chart(document.getElementById('chartReh'), {
        type:'bar', plugins:[tickLabels],
        data:{ labels:labels, datasets:[
          { label:'Present', data:pts.map(function(p){return p.sat;}),
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:44 } ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},
          tooltip:{callbacks:{label:function(c){return c.raw?'Present':'Absent';}}}},
          scales:{ x:xAxis, y:binAxis } }
      });

      if (chartSun) chartSun.destroy();
      chartSun = new Chart(document.getElementById('chartSun'), {
        type:'bar', plugins:[tickLabels],
        data:{ labels:labels, datasets:[
          { label:'Present', data:pts.map(function(p){return p.sun;}),
            backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:44 } ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},
          tooltip:{callbacks:{label:function(c){return c.raw?'Present':'Absent';}}}},
          scales:{ x:xAxis, y:binAxis } }
      });
    }
  </script>
</body>
</html>
