<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Weekly Summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="roster.js"></script>
  <script src="model.js"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --green:#38b26a; }
    * { box-sizing:border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:14px 22px 50px; }
    .nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px; padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    .title { text-align:center; font-family:Georgia,serif; color:var(--gold); font-size:30px; margin:6px 0 4px; }
    .sub { text-align:center; color:#8a8a8a; font-size:13px; margin-bottom:14px; }
    .cards { display:flex; gap:14px; justify-content:center; margin:14px 0 4px; flex-wrap:wrap; }
    .card { background:#0e0e0e; border:1px solid #262626; border-radius:12px; padding:16px 24px; text-align:center; min-width:160px; }
    .card .n { font-size:32px; font-weight:bold; }
    .card .l { font-size:13px; color:#999; margin-top:4px; }
    .legend { display:flex; gap:26px; justify-content:center; margin:18px 0 4px; color:#cfcfcf; font-size:15px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:9px; }
    .sw { width:24px; height:13px; border-radius:2px; display:inline-block; }
    .chartbox { height:460px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">Per Hub</a>
      <a href="all.html">All Hubs</a>
      <a href="summary.html" class="active">Weekly Summary</a>
    </div>
    <div class="title">WHOLE MINISTRY — WEEKLY</div>
    <div class="sub">All shepherds combined, one set of bars per week</div>

    <div class="cards" id="cards"></div>

    <div class="legend">
      <span><i class="sw" style="background:var(--blue)"></i> Saturday attendance</span>
      <span><i class="sw" style="background:var(--green)"></i> Sunday attendance</span>
      <span><i class="sw" style="background:var(--gold)"></i> Offering (GHS)</span>
    </div>
    <div class="chartbox"><canvas id="chart"></canvas></div>
  </div>

  <script>
    GLGC.load(function (MODEL) {
      var w = MODEL.weekly;
      var last = w[w.length - 1];
      var totalOff = w.reduce(function (a, p) { return a + p.offering; }, 0);
      document.getElementById('cards').innerHTML =
        '<div class="card"><div class="n">' + MODEL.shepherds.length + '</div><div class="l">Shepherds on roll</div></div>' +
        '<div class="card"><div class="n" style="color:var(--blue)">' + last.satPresent + '</div><div class="l">Latest Saturday</div></div>' +
        '<div class="card"><div class="n" style="color:var(--green)">' + last.sunPresent + '</div><div class="l">Latest Sunday</div></div>' +
        '<div class="card"><div class="n" style="color:var(--gold)">GHS ' + totalOff.toLocaleString() + '</div><div class="l">Total offering</div></div>';

      var labels = w.map(function (p) { return ['WK ' + p.week, p.label.split('· ')[1] || '']; });
      new Chart(document.getElementById('chart'), {
        type: 'bar',
        plugins: [GLGC.valueLabels],
        data: { labels: labels, datasets: [
          { label:'Saturday attendance', data:w.map(function(p){return p.satPresent;}),
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:34, yAxisID:'y' },
          { label:'Sunday attendance', data:w.map(function(p){return p.sunPresent;}),
            backgroundColor:'#38b26a', borderRadius:3, maxBarThickness:34, yAxisID:'y' },
          { label:'Offering (GHS)', data:w.map(function(p){return p.offering;}),
            backgroundColor:'#e6c878', borderRadius:3, maxBarThickness:34, yAxisID:'y1' }
        ]},
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{
            x:{ ticks:{color:'#ddd',font:{size:12}}, grid:{color:'#1e1e1e'} },
            y:{ beginAtZero:true, grace:'12%', position:'left', title:{display:true,text:'People',color:'#888'},
                ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} },
            y1:{ beginAtZero:true, grace:'12%', position:'right', title:{display:true,text:'GHS',color:'#888'},
                ticks:{color:'#e6c878'}, grid:{drawOnChartArea:false} }
          }
        }
      });
    }, function (e) { console.error(e); });
  </script>
</body>
</html>
