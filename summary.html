<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Weekly Summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="roster.js?v=30"></script>
  <script src="model.js?v=30"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --red:#e2574c; --sun:#f5c518; }
    * { box-sizing:border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .wrap { max-width:1180px; margin:0 auto; padding:14px 22px 60px; }
    .nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px; padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    .title { text-align:center; font-family:Georgia,serif; color:var(--gold); font-size:30px; margin:6px 0 4px; }
    .summary { text-align:center; color:#cfcfcf; font-size:15px; margin-bottom:12px; }
    .summary b { color:#fff; }
    .picker { display:flex; gap:10px; justify-content:center; align-items:center; margin-bottom:6px; }
    .picker .lbl { color:#999; font-size:13px; }
    select { background:#111; color:#fff; border:1px solid #333; border-radius:8px; padding:9px 12px; font-size:15px; }
    .section { margin-top:24px; }
    .section-label { display:inline-block; background:#161616; border:1px solid #333;
      border-left:4px solid var(--gold); border-radius:8px; padding:8px 18px;
      font-size:17px; font-weight:bold; letter-spacing:.5px; }
    .legend { display:flex; gap:26px; margin:14px 2px 4px; color:#cfcfcf; font-size:15px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:9px; }
    .sw { width:24px; height:13px; border-radius:2px; display:inline-block; }
    .chartscroll { overflow-x:auto; }
    .chartinner { height:430px; min-width:100%; }
    .empty { color:#777; font-size:15px; text-align:center; padding:60px 20px;
      border:1px dashed #2a2a2a; border-radius:12px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="slides.html">Slideshow</a>
      <a href="all.html">Per Choir</a>
      <a href="summary.html" class="active">Overall Summary</a>
    </div>
    <div class="title">OVERALL SUMMARY</div>
    <div class="summary" id="summary"></div>
    <div class="picker">
      <span class="lbl">Week:</span>
      <select id="week" onchange="render()"></select>
    </div>

    <div class="section">
      <div class="section-label">🎼 Rehearsal Attendance — by choir</div>
      <div class="legend">
        <span><i class="sw" style="background:var(--blue)"></i> Rehearsal attendance</span>
        <span><i class="sw" style="background:var(--red)"></i> Offering (GHS)</span>
      </div>
      <div class="chartscroll"><div class="chartinner" id="rehInner"><canvas id="chartReh"></canvas></div></div>
      <div class="empty" id="rehEmpty" style="display:none">No rehearsals reported for this week yet.</div>
    </div>

    <div class="section">
      <div class="section-label">⛪ Sunday Attendance — by choir</div>
      <div class="legend">
        <span><i class="sw" style="background:var(--sun)"></i> Sunday attendance</span>
      </div>
      <div class="chartscroll"><div class="chartinner" id="sunInner"><canvas id="chartSun"></canvas></div></div>
      <div class="empty" id="sunEmpty" style="display:none">No Sunday attendance recorded for this week yet.</div>
    </div>
  </div>

  <script>
    var MODEL = null, chartReh = null, chartSun = null;

    GLGC.load(function (m) {
      MODEL = m;
      var wk = document.getElementById('week');
      MODEL.weeks.forEach(function (w, i) {
        var o = document.createElement('option'); o.value = i; o.textContent = w.label;
        wk.appendChild(o);
      });
      // default to the latest week that has any rehearsal reports, else the last week
      var def = MODEL.weeks.length - 1;
      for (var i = MODEL.weeks.length - 1; i >= 0; i--) {
        if (MODEL.satWeekly && MODEL.satWeekly[i] && MODEL.satWeekly[i].length) { def = i; break; }
      }
      wk.value = def;
      render();
    }, function (e) { console.error(e); });

    function toggle(innerId, emptyId, has) {
      document.getElementById(innerId).parentNode.style.display = has ? '' : 'none';
      document.getElementById(emptyId).style.display = has ? 'none' : 'block';
    }
    function shortChoir(c) { return c.replace(/ Choir| Singers/, ''); }

    function render() {
      if (!MODEL) return;
      var wi = +document.getElementById('week').value;
      var w = MODEL.weeks[wi];
      var xAxis = { ticks:{color:'#ddd',font:{size:12}}, grid:{color:'#1e1e1e'} };
      var peopleAxis = { beginAtZero:true, grace:'14%', position:'left',
        title:{display:true,text:'People',color:'#888'}, ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} };

      // ---- Rehearsal attendance + offering, per choir ----
      var reh = MODEL.choirs.map(function (c) {
        return { name: shortChoir(c.choir), att: c.points[wi].satPresent, off: c.points[wi].offering };
      }).filter(function (r) { return r.att != null || r.off != null; })
        .sort(function (a, b) { return (b.att || 0) - (a.att || 0); });

      var totAtt = reh.reduce(function (a, r) { return a + (r.att || 0); }, 0);
      var totOff = reh.reduce(function (a, r) { return a + (r.off || 0); }, 0);
      document.getElementById('summary').innerHTML =
        w.label + '  ·  <b>' + reh.length + '</b> choirs reported  ·  <b>' + totAtt +
        '</b> rehearsal attendance  ·  <b>GHS ' + totOff.toLocaleString() + '</b> offering';

      var hasReh = reh.length > 0;
      toggle('rehInner', 'rehEmpty', hasReh);
      if (hasReh) {
        document.getElementById('rehInner').style.minWidth = Math.max(700, reh.length * 78) + 'px';
        if (chartReh) chartReh.destroy();
        chartReh = new Chart(document.getElementById('chartReh'), {
          type: 'bar', plugins: [GLGC.valueLabels],
          data: { labels: reh.map(function(r){return r.name;}), datasets: [
            { label:'Rehearsal attendance', data:reh.map(function(r){return r.att;}),
              backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:36, yAxisID:'y' },
            { label:'Offering (GHS)', data:reh.map(function(r){return r.off;}),
              backgroundColor:'#e2574c', borderRadius:3, maxBarThickness:36, yAxisID:'y1' }
          ]},
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
            scales:{ x:xAxis, y:peopleAxis,
              y1:{ beginAtZero:true, grace:'14%', position:'right', title:{display:true,text:'GHS',color:'#888'},
                   ticks:{color:'#e2574c'}, grid:{drawOnChartArea:false} } } }
        });
      } else if (chartReh) { chartReh.destroy(); chartReh = null; }

      // ---- Sunday attendance, per choir ----
      var sun = MODEL.choirs.map(function (c) {
        return { name: shortChoir(c.choir), v: c.points[wi].sunPresent };
      }).filter(function (r) { return r.v != null; })
        .sort(function (a, b) { return b.v - a.v; });
      var hasSun = sun.length > 0;
      toggle('sunInner', 'sunEmpty', hasSun);
      if (hasSun) {
        document.getElementById('sunInner').style.minWidth = Math.max(700, sun.length * 78) + 'px';
        if (chartSun) chartSun.destroy();
        chartSun = new Chart(document.getElementById('chartSun'), {
          type: 'bar', plugins: [GLGC.valueLabels],
          data: { labels: sun.map(function(r){return r.name;}), datasets: [
            { label:'Sunday attendance', data:sun.map(function(r){return r.v;}),
              backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:36, yAxisID:'y' }
          ]},
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
            scales:{ x:xAxis, y:peopleAxis } }
        });
      } else if (chartSun) { chartSun.destroy(); chartSun = null; }
    }
  </script>
</body>
</html>
