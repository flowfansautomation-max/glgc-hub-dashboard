<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Weekly Summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="roster.js"></script>
  <script src="model.js"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --red:#e2574c; --sun:#f5c518; }
    * { box-sizing:border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:14px 22px 60px; }
    .nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px; padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    .title { text-align:center; font-family:Georgia,serif; color:var(--gold); font-size:30px; margin:6px 0 4px; }
    .sub { text-align:center; color:#8a8a8a; font-size:13px; margin-bottom:14px; }
    .cards { display:flex; gap:14px; justify-content:center; margin:14px 0 4px; flex-wrap:wrap; }
    .card { background:#0e0e0e; border:1px solid #262626; border-radius:12px; padding:16px 24px; text-align:center; min-width:150px; }
    .card .n { font-size:30px; font-weight:bold; }
    .card .l { font-size:13px; color:#999; margin-top:4px; }
    .section { margin-top:26px; }
    .section-label { display:inline-block; background:#161616; border:1px solid #333;
      border-left:4px solid var(--gold); border-radius:8px; padding:8px 18px;
      font-size:17px; font-weight:bold; letter-spacing:.5px; }
    .legend { display:flex; gap:26px; margin:14px 2px 4px; color:#cfcfcf; font-size:15px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:9px; }
    .sw { width:24px; height:13px; border-radius:2px; display:inline-block; }
    .chartbox { height:340px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">Per Hub</a>
      <a href="all.html">All Hubs</a>
      <a href="summary.html" class="active">Weekly Summary</a>
    </div>
    <div class="title">WHOLE MINISTRY — WEEKLY</div>
    <div class="sub">Every hub combined, one bar per week</div>

    <div class="cards" id="cards"></div>

    <div class="section">
      <div class="section-label">🎼 Rehearsal Attendance</div>
      <div class="legend">
        <span><i class="sw" style="background:var(--blue)"></i> Rehearsal attendance</span>
        <span><i class="sw" style="background:var(--red)"></i> Offering (GHS)</span>
      </div>
      <div class="chartbox"><canvas id="chartReh"></canvas></div>
    </div>

    <div class="section">
      <div class="section-label">⛪ Sunday Attendance</div>
      <div class="legend">
        <span><i class="sw" style="background:var(--sun)"></i> Sunday attendance</span>
      </div>
      <div class="chartbox"><canvas id="chartSun"></canvas></div>
    </div>
  </div>

  <script>
    GLGC.load(function (MODEL) {
      var w = MODEL.weekly;
      // most recent week that actually has a value for the given field
      function latest(field) { for (var i = w.length - 1; i >= 0; i--) { if (w[i][field]) return w[i][field]; } return 0; }
      var totalOff = w.reduce(function (a, p) { return a + (p.offering || 0); }, 0);
      document.getElementById('cards').innerHTML =
        '<div class="card"><div class="n">' + MODEL.shepherds.length + '</div><div class="l">People on roll</div></div>' +
        '<div class="card"><div class="n" style="color:var(--blue)">' + latest('satPresent') + '</div><div class="l">Latest rehearsal</div></div>' +
        '<div class="card"><div class="n" style="color:var(--sun)">' + latest('sunPresent') + '</div><div class="l">Latest Sunday</div></div>' +
        '<div class="card"><div class="n" style="color:var(--gold)">GHS ' + totalOff.toLocaleString() + '</div><div class="l">Total offering</div></div>';

      var labels = w.map(function (p) { return ['WK ' + p.week, p.label.split('· ')[1] || '']; });
      var xAxis = { ticks:{color:'#ddd',font:{size:12}}, grid:{color:'#1e1e1e'} };
      var peopleAxis = { beginAtZero:true, grace:'12%', position:'left',
        title:{display:true,text:'People',color:'#888'}, ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} };

      // Rehearsal attendance + offering
      new Chart(document.getElementById('chartReh'), {
        type: 'bar', plugins: [GLGC.valueLabels],
        data: { labels: labels, datasets: [
          { label:'Rehearsal attendance', data:w.map(function(p){return p.satPresent;}),
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:30, yAxisID:'y' },
          { label:'Offering (GHS)', data:w.map(function(p){return p.offering;}),
            backgroundColor:'#e2574c', borderRadius:3, maxBarThickness:30, yAxisID:'y1' }
        ]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
          scales:{ x:xAxis, y:peopleAxis,
            y1:{ beginAtZero:true, grace:'12%', position:'right', title:{display:true,text:'GHS',color:'#888'},
                 ticks:{color:'#e2574c'}, grid:{drawOnChartArea:false} } } }
      });

      // Sunday attendance
      new Chart(document.getElementById('chartSun'), {
        type: 'bar', plugins: [GLGC.valueLabels],
        data: { labels: labels, datasets: [
          { label:'Sunday attendance', data:w.map(function(p){return p.sunPresent;}),
            backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:30, yAxisID:'y' }
        ]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
          scales:{ x:xAxis, y:peopleAxis } }
      });
    }, function (e) { console.error(e); });
  </script>
</body>
</html>
