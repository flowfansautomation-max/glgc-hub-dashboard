<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Slideshow</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="roster.js?v=32"></script>
  <script src="model.js?v=32"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --red:#e2574c; --sun:#f5c518; }
    * { box-sizing:border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .top { display:flex; gap:10px; justify-content:center; align-items:center; padding:12px 16px 4px; flex-wrap:wrap; }
    .nav { display:flex; gap:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px; padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    select, .btn { background:#111; color:#fff; border:1px solid #333; border-radius:8px; padding:8px 12px; font-size:14px; }
    select { max-width:250px; }
    .btn { cursor:pointer; background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    .btn:disabled { opacity:.5; cursor:default; }
    .prog { color:var(--gold); font-size:13px; }

    .stage { position:relative; max-width:1240px; margin:0 auto; padding:6px 76px 40px; }
    .navbtn { position:fixed; top:50%; transform:translateY(-50%); z-index:5;
      width:56px; height:110px; border:1px solid #333; background:#141414cc; color:#e6c878;
      font-size:44px; line-height:1; border-radius:12px; cursor:pointer; }
    .navbtn:hover { background:#222; }
    .navbtn.prev { left:14px; } .navbtn.next { right:14px; }
    .navbtn:disabled { opacity:.25; cursor:default; }

    .header { text-align:center; margin:8px 0 2px; }
    .avatar, .initials { width:112px; height:112px; border-radius:50%; border:3px solid #6a6a6a; margin:0 auto; }
    .avatar { object-fit:cover; background:#1a1a1a; }
    .initials { background:linear-gradient(135deg,#3a3a3a,#5a5a5a); display:flex;
      align-items:center; justify-content:center; font-size:40px; font-weight:bold; }
    .pos { text-align:center; color:#e6e6e6; font-size:20px; line-height:1.6; letter-spacing:.3px; margin:12px 0 6px; }
    .pos b { color:var(--gold); font-weight:bold; }
    .pos .choir { display:block; font-family:Georgia,'Times New Roman',serif; color:var(--gold);
      font-size:36px; font-weight:bold; letter-spacing:.5px; margin-bottom:6px; }

    @media (max-width: 820px) {
      .stage { padding:6px 12px 40px; }
      .pos { font-size:17px; } .pos .choir { font-size:27px; }
      .navbtn { width:40px; height:64px; font-size:30px; }
    }

    .section { margin-top:16px; }
    .section-label { display:inline-block; background:#161616; border:1px solid #333;
      border-left:4px solid var(--gold); border-radius:8px; padding:7px 16px;
      font-size:16px; font-weight:bold; letter-spacing:.5px; }
    .legend { display:flex; gap:24px; margin:10px 2px 2px; color:#cfcfcf; font-size:14px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:8px; }
    .sw { width:22px; height:12px; border-radius:2px; display:inline-block; }
    .chartbox { height:360px; margin-top:4px; }
    .chart-empty { color:#777; font-size:14px; text-align:center; padding:120px 20px;
      border:1px dashed #2a2a2a; border-radius:12px; margin-top:4px; }
    .loading { text-align:center; color:#888; padding:80px; font-size:18px; }
  </style>
</head>
<body>
  <div class="top">
    <div class="nav">
      <a href="slides.html" class="active">Slideshow</a>
      <a href="all.html">Per Choir</a>
      <a href="summary.html">Overall Summary</a>
    </div>
    <select id="jump" onchange="goTo(+this.value)"></select>
    <button class="btn" id="pdfBtn" onclick="generatePDF()">⤓ Download PDF</button>
    <span class="prog" id="pdfProg" style="display:none"></span>
  </div>

  <button class="navbtn prev" id="prev" onclick="step(-1)">‹</button>
  <button class="navbtn next" id="next" onclick="step(1)">›</button>

  <div class="stage">
    <div id="loading" class="loading">Loading…</div>
    <div id="slide" style="display:none">
      <div class="header">
        <img id="avatar" class="avatar" alt="" style="display:none">
        <div id="initials" class="initials" style="display:none"></div>
      </div>
      <div class="pos" id="pos"></div>

      <div class="section">
        <div class="section-label">🎼 Rehearsal Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--blue)"></i> Rehearsal attendance</span>
          <span><i class="sw" style="background:var(--red)"></i> Offering (GHS)</span>
        </div>
        <div class="chartbox" id="rehBox"><canvas id="chartReh"></canvas></div>
        <div class="chart-empty" id="rehEmpty" style="display:none">No rehearsal recorded yet this year.</div>
      </div>

      <div class="section">
        <div class="section-label">⛪ Sunday Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--sun)"></i> Sunday attendance</span>
        </div>
        <div class="chartbox" id="sunBox"><canvas id="chartSun"></canvas></div>
        <div class="chart-empty" id="sunEmpty" style="display:none">No Sunday attendance recorded yet this year.</div>
      </div>
    </div>
  </div>

  <script>
    var MODEL = null, LIST = [], idx = 0, chartReh = null, chartSun = null;
    var rehActive = [], sunActive = [];   // weeks the forms were actually being collected

    // fills a chart's canvas black so exports match the dark dashboard look
    var blackBg = { id:'blackBg', beforeDraw:function(c){ var x=c.ctx; x.save(); x.fillStyle='#000'; x.fillRect(0,0,c.width,c.height); x.restore(); } };

    // draws every value INCLUDING 0 (so a "didn't fill" week shows a 0, not a blank); skips null
    var valueLabels0 = { id:'valueLabels0', afterDatasetsDraw:function(chart){
      var ctx=chart.ctx;
      chart.data.datasets.forEach(function(ds,di){
        var meta=chart.getDatasetMeta(di); if(meta.hidden) return;
        meta.data.forEach(function(bar,i){
          var v=ds.data[i]; if(v==null) return;
          ctx.save(); ctx.fillStyle='#fff'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
          ctx.fillText(v, bar.x, bar.y-5); ctx.restore();
        });
      });
    }};

    function weekLabels(pts){ return pts.map(function(p){ return ['WK '+p.week, p.label.split('· ')[1]||'']; }); }

    // chart configs (shared by the on-screen slide and the PDF export)
    function rehConfig(pts, labels, pdf) {
      var att = pts.map(function(p,i){ return rehActive[i] ? (p.satPresent==null?0:p.satPresent) : p.satPresent; });
      var off = pts.map(function(p,i){ return rehActive[i] ? (p.offering==null?0:p.offering) : p.offering; });
      return { type:'bar', plugins: pdf ? [valueLabels0, blackBg] : [valueLabels0],
        data:{ labels:labels, datasets:[
          { label:'Rehearsal attendance', data:att,
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:34, yAxisID:'y' },
          { label:'Offering (GHS)', data:off,
            backgroundColor:'#e2574c', borderRadius:3, maxBarThickness:34, yAxisID:'y1' }
        ]},
        options:{ responsive:!pdf, maintainAspectRatio:false, animation: pdf?false:{duration:400},
          plugins:{ legend:{display:false} },
          scales:{
            x:{ ticks:{color:'#ddd',font:{size:10},maxRotation:60,minRotation:45}, grid:{color:'#1e1e1e'} },
            y:{ beginAtZero:true, grace:'14%', position:'left', ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} },
            y1:{ beginAtZero:true, grace:'14%', position:'right', ticks:{color:'#e2574c'}, grid:{drawOnChartArea:false} } } } };
    }
    function sunConfig(pts, labels, pdf) {
      var sun = pts.map(function(p,i){ return sunActive[i] ? (p.sunPresent==null?0:p.sunPresent) : p.sunPresent; });
      return { type:'bar', plugins: pdf ? [valueLabels0, blackBg] : [valueLabels0],
        data:{ labels:labels, datasets:[
          { label:'Sunday attendance', data:sun,
            backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:34, yAxisID:'y' }
        ]},
        options:{ responsive:!pdf, maintainAspectRatio:false, animation: pdf?false:{duration:400},
          plugins:{ legend:{display:false} },
          scales:{
            x:{ ticks:{color:'#ddd',font:{size:10},maxRotation:60,minRotation:45}, grid:{color:'#1e1e1e'} },
            y:{ beginAtZero:true, grace:'14%', ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} } } } };
    }

    // shepherds kept in the data (so their numbers still count toward the hub/choir)
    // but hidden from the slideshow — no slide of their own.
    var HIDE_SLIDES = { 'Papa Yaw Ashun': true };

    GLGC.load(function (m) {
      MODEL = m;
      LIST = MODEL.shepherds.filter(function (s) { return !HIDE_SLIDES[s.name]; });   // ordered choir -> governor -> shepherds
      // a week is "active" if the form was collected then (anyone reported) — those
      // weeks show a 0 for people who didn't fill; earlier weeks stay blank.
      MODEL.weeks.forEach(function(w,i){
        rehActive[i] = MODEL.shepherds.some(function(s){ return s.points[i].satPresent!=null || s.points[i].offering!=null; });
        sunActive[i] = MODEL.shepherds.some(function(s){ return s.points[i].sunPresent!=null; });
      });
      var jump = document.getElementById('jump');
      var lastChoir = null, og = null;
      LIST.forEach(function (s, i) {
        if (s.choir !== lastChoir) { lastChoir = s.choir; og = document.createElement('optgroup'); og.label = s.choir; jump.appendChild(og); }
        var o = document.createElement('option'); o.value = i; o.textContent = s.name; og.appendChild(o);
      });
      document.getElementById('loading').style.display = 'none';
      document.getElementById('slide').style.display = 'block';
      var q = (location.search.match(/[?&]i=(\d+)/) || [])[1];
      goTo(q ? Math.min(+q, LIST.length - 1) : 0);
    }, function (e) { document.getElementById('loading').textContent = 'Could not load data'; console.error(e); });

    function step(d) { goTo(idx + d); }
    function goTo(i) {
      if (!LIST.length) return;
      idx = Math.max(0, Math.min(LIST.length - 1, i));
      document.getElementById('jump').value = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === LIST.length - 1;
      render(LIST[idx]);
    }
    document.addEventListener('keydown', function (e) {
      if (e.target.tagName === 'SELECT') return;
      if (e.key === 'ArrowRight') step(1); else if (e.key === 'ArrowLeft') step(-1);
    });

    function render(s) {
      document.getElementById('pos').innerHTML =
        '<span class="choir">' + s.choir + '</span>' +
        'Governor: <b>' + s.governor + '</b>' +
        '<br>Shepherd: <b>' + s.name + '</b>';
      GLGC.setAvatar(document.getElementById('avatar'), document.getElementById('initials'), s.photoKey, s.name);

      var pts = s.points, labels = weekLabels(pts);
      var hasReh = rehActive.some(Boolean);
      document.getElementById('rehBox').style.display = hasReh ? '' : 'none';
      document.getElementById('rehEmpty').style.display = hasReh ? 'none' : 'block';
      if (chartReh) { chartReh.destroy(); chartReh = null; }
      if (hasReh) chartReh = new Chart(document.getElementById('chartReh'), rehConfig(pts, labels, false));

      var hasSun = sunActive.some(Boolean);
      document.getElementById('sunBox').style.display = hasSun ? '' : 'none';
      document.getElementById('sunEmpty').style.display = hasSun ? 'none' : 'block';
      if (chartSun) { chartSun.destroy(); chartSun = null; }
      if (hasSun) chartSun = new Chart(document.getElementById('chartSun'), sunConfig(pts, labels, false));
    }

    // ---- PDF export: one page per shepherd, dark, charts as images ----
    function chartImage(cfg) {
      return new Promise(function (res) {
        var cv = document.createElement('canvas'); cv.width = 1500; cv.height = 380;
        cv.style.position = 'fixed'; cv.style.left = '-99999px'; cv.style.top = '0';
        document.body.appendChild(cv);
        var ch = new Chart(cv, cfg);
        setTimeout(function () { var d = ch.toBase64Image('image/jpeg', 0.9); ch.destroy(); cv.remove(); res(d); }, 60);
      });
    }
    async function generatePDF() {
      var btn = document.getElementById('pdfBtn'), prog = document.getElementById('pdfProg');
      btn.disabled = true; prog.style.display = 'inline';
      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
      var W = 297, H = 210, M = 12;
      for (var i = 0; i < LIST.length; i++) {
        var s = LIST[i], pts = s.points, labels = weekLabels(pts);
        if (i > 0) doc.addPage();
        doc.setFillColor(0,0,0); doc.rect(0,0,W,H,'F');
        doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(20);
        doc.text(s.name, W/2, 15, { align:'center' });
        doc.setTextColor(230,200,120); doc.setFont('times','normal'); doc.setFontSize(14);
        doc.text(s.choir.toUpperCase(), W/2, 23, { align:'center' });
        doc.setTextColor(180,180,180); doc.setFont('helvetica','normal'); doc.setFontSize(9);
        doc.text('Hub: ' + s.governor + (s.phone ? '   ·   ' + s.phone : '') + '        ' + (i+1) + ' / ' + LIST.length, W/2, 29, { align:'center' });

        doc.setTextColor(230,200,120); doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('Rehearsal Attendance   (blue = people, red = offering GHS)', M, 37);
        if (rehActive.some(Boolean)) {
          doc.addImage(await chartImage(rehConfig(pts, labels, true)), 'JPEG', M, 39, W - 2*M, 69);
        } else { doc.setTextColor(120,120,120); doc.setFont('helvetica','normal'); doc.setFontSize(10);
          doc.text('No rehearsal recorded yet this year.', W/2, 73, { align:'center' }); }

        doc.setTextColor(230,200,120); doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('Sunday Attendance', M, 118);
        if (sunActive.some(Boolean)) {
          doc.addImage(await chartImage(sunConfig(pts, labels, true)), 'JPEG', M, 120, W - 2*M, 69);
        } else { doc.setTextColor(120,120,120); doc.setFont('helvetica','normal'); doc.setFontSize(10);
          doc.text('No Sunday attendance recorded yet this year.', W/2, 154, { align:'center' }); }

        prog.textContent = 'Generating PDF… ' + (i+1) + ' / ' + LIST.length;
      }
      doc.save('GLGC-Shepherds-Slideshow.pdf');
      prog.style.display = 'none'; btn.disabled = false;
    }
  </script>
</body>
</html>
