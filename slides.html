<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Hub Dashboard — Slideshow</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="roster.js?v=28"></script>
  <script src="model.js?v=28"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; --red:#e2574c; --sun:#f5c518; }
    * { box-sizing:border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .top { display:flex; gap:10px; justify-content:center; align-items:center; padding:12px 16px 4px; flex-wrap:wrap; }
    .nav { display:flex; gap:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px; padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }
    select { background:#111; color:#fff; border:1px solid #333; border-radius:8px; padding:8px 12px; font-size:14px; max-width:260px; }

    .stage { position:relative; max-width:1080px; margin:0 auto; padding:6px 70px 60px; }
    .navbtn { position:fixed; top:50%; transform:translateY(-50%); z-index:5;
      width:56px; height:96px; border:1px solid #333; background:#141414cc; color:#e6c878;
      font-size:44px; line-height:1; border-radius:12px; cursor:pointer; }
    .navbtn:hover { background:#222; }
    .navbtn.prev { left:14px; } .navbtn.next { right:14px; }
    .navbtn:disabled { opacity:.25; cursor:default; }

    .pos { text-align:center; color:#8a8a8a; font-size:13px; letter-spacing:.4px; margin:4px 0 2px; }
    .pos b { color:var(--gold); }
    .header { position:relative; text-align:center; padding:6px 130px; min-height:112px; }
    .avatar, .initials { position:absolute; top:0; left:0; width:108px; height:108px;
      border-radius:50%; border:3px solid #6a6a6a; }
    .avatar { object-fit:cover; background:#1a1a1a; }
    .initials { background:linear-gradient(135deg,#3a3a3a,#5a5a5a); display:flex;
      align-items:center; justify-content:center; font-size:36px; font-weight:bold; }
    .leader { font-size:32px; font-weight:bold; line-height:1.1; }
    .choirName { font-family:Georgia,'Times New Roman',serif; color:var(--gold);
      font-size:25px; letter-spacing:1px; margin-top:6px; text-transform:uppercase; }
    .meta { font-size:15px; color:#bcbcbc; margin-top:8px; }
    .meta b { color:#fff; }

    @media (max-width: 820px) {
      .stage { padding:6px 12px 50px; }
      .header { padding:0; min-height:auto; }
      .avatar, .initials { position:static; margin:10px auto 6px; }
      .leader { font-size:25px; } .choirName { font-size:20px; }
      .navbtn { width:42px; height:70px; font-size:32px; }
    }

    .section { margin-top:20px; }
    .section-label { display:inline-block; background:#161616; border:1px solid #333;
      border-left:4px solid var(--gold); border-radius:8px; padding:7px 16px;
      font-size:16px; font-weight:bold; letter-spacing:.5px; }
    .legend { display:flex; gap:24px; margin:12px 2px 2px; color:#cfcfcf; font-size:14px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:8px; }
    .sw { width:22px; height:12px; border-radius:2px; display:inline-block; }
    .chartbox { height:250px; margin-top:4px; }
    .chart-empty { color:#777; font-size:14px; text-align:center; padding:48px 20px;
      border:1px dashed #2a2a2a; border-radius:12px; margin-top:4px; }
    .loading { text-align:center; color:#888; padding:80px; font-size:18px; }
  </style>
</head>
<body>
  <div class="top">
    <div class="nav">
      <a href="index.html">Per Hub</a>
      <a href="all.html">All Hubs</a>
      <a href="summary.html">Weekly Summary</a>
      <a href="slides.html" class="active">Slideshow</a>
    </div>
    <select id="jump" onchange="goTo(+this.value)"></select>
  </div>

  <button class="navbtn prev" id="prev" onclick="step(-1)">‹</button>
  <button class="navbtn next" id="next" onclick="step(1)">›</button>

  <div class="stage">
    <div id="loading" class="loading">Loading…</div>
    <div id="slide" style="display:none">
      <div class="pos" id="pos"></div>
      <div class="header">
        <img id="avatar" class="avatar" alt="" style="display:none">
        <div id="initials" class="initials" style="display:none"></div>
        <div class="leader" id="leader"></div>
        <div class="choirName" id="choirName"></div>
        <div class="meta" id="metaLine"></div>
      </div>

      <div class="section">
        <div class="section-label">🎼 Rehearsal Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--blue)"></i> Rehearsal attendance</span>
          <span><i class="sw" style="background:var(--red)"></i> Offering (GHS)</span>
        </div>
        <div class="chartbox" id="rehBox"><canvas id="chartReh"></canvas></div>
        <div class="chart-empty" id="rehEmpty" style="display:none">No rehearsal recorded yet this year.</div>
      </div>

      <div class="section">
        <div class="section-label">⛪ Sunday Attendance</div>
        <div class="legend">
          <span><i class="sw" style="background:var(--sun)"></i> Sunday attendance</span>
        </div>
        <div class="chartbox" id="sunBox"><canvas id="chartSun"></canvas></div>
        <div class="chart-empty" id="sunEmpty" style="display:none">No Sunday attendance recorded yet this year.</div>
      </div>
    </div>
  </div>

  <script>
    var MODEL = null, LIST = [], idx = 0, chartReh = null, chartSun = null;
    function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

    GLGC.load(function (m) {
      MODEL = m;
      LIST = MODEL.shepherds;   // already ordered choir -> governor -> shepherds
      var jump = document.getElementById('jump');
      var lastChoir = null, og = null;
      LIST.forEach(function (s, i) {
        if (s.choir !== lastChoir) { lastChoir = s.choir; og = document.createElement('optgroup'); og.label = s.choir; jump.appendChild(og); }
        var o = document.createElement('option'); o.value = i; o.textContent = s.name;
        og.appendChild(o);
      });
      document.getElementById('loading').style.display = 'none';
      document.getElementById('slide').style.display = 'block';
      // deep-link by ?i=
      var q = (location.search.match(/[?&]i=(\d+)/) || [])[1];
      goTo(q ? Math.min(+q, LIST.length - 1) : 0);
    }, function (e) { document.getElementById('loading').textContent = 'Could not load data'; console.error(e); });

    function step(d) { goTo(idx + d); }
    function goTo(i) {
      if (!LIST.length) return;
      idx = Math.max(0, Math.min(LIST.length - 1, i));
      document.getElementById('jump').value = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === LIST.length - 1;
      render(LIST[idx]);
    }
    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') step(1);
      else if (e.key === 'ArrowLeft') step(-1);
    });

    function render(s) {
      document.getElementById('pos').innerHTML =
        s.choir + '  ·  Hub: <b>' + s.governor + '</b>  ·  ' + (idx + 1) + ' / ' + LIST.length;
      document.getElementById('leader').textContent = s.name;
      var cn = document.getElementById('choirName');
      cn.textContent = (s.choir.toUpperCase() !== s.name.toUpperCase()) ? s.choir : '';
      document.getElementById('metaLine').innerHTML =
        'Shepherd  ·  🧭 ' + s.governor + (s.phone ? '  ·  ' + s.phone : '');
      GLGC.setAvatar(document.getElementById('avatar'), document.getElementById('initials'), s.photoKey, s.name);

      var pts = s.points;
      var labels = pts.map(function (p) { return ['WK ' + p.week, p.label.split('· ')[1] || '']; });
      var xAxis = { ticks:{color:'#ddd',font:{size:10},maxRotation:60,minRotation:45}, grid:{color:'#1e1e1e'} };
      var peopleAxis = { beginAtZero:true, grace:'14%', position:'left', ticks:{color:'#ddd'}, grid:{color:'#1e1e1e'} };

      var hasReh = pts.some(function(p){ return p.satPresent!=null || p.offering!=null; });
      document.getElementById('rehBox').style.display = hasReh ? '' : 'none';
      document.getElementById('rehEmpty').style.display = hasReh ? 'none' : 'block';
      if (chartReh) { chartReh.destroy(); chartReh = null; }
      if (hasReh) chartReh = new Chart(document.getElementById('chartReh'), {
        type:'bar', plugins:[GLGC.valueLabels],
        data:{ labels:labels, datasets:[
          { label:'Rehearsal attendance', data:pts.map(function(p){return p.satPresent;}),
            backgroundColor:'#1f5fff', borderRadius:3, maxBarThickness:30, yAxisID:'y' },
          { label:'Offering (GHS)', data:pts.map(function(p){return p.offering;}),
            backgroundColor:'#e2574c', borderRadius:3, maxBarThickness:30, yAxisID:'y1' }
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ x:xAxis, y:peopleAxis,
            y1:{ beginAtZero:true, grace:'14%', position:'right', ticks:{color:'#e2574c'}, grid:{drawOnChartArea:false} } } }
      });

      var hasSun = pts.some(function(p){ return p.sunPresent!=null; });
      document.getElementById('sunBox').style.display = hasSun ? '' : 'none';
      document.getElementById('sunEmpty').style.display = hasSun ? 'none' : 'block';
      if (chartSun) { chartSun.destroy(); chartSun = null; }
      if (hasSun) chartSun = new Chart(document.getElementById('chartSun'), {
        type:'bar', plugins:[GLGC.valueLabels],
        data:{ labels:labels, datasets:[
          { label:'Sunday attendance', data:pts.map(function(p){return p.sunPresent;}),
            backgroundColor:'#f5c518', borderRadius:3, maxBarThickness:30, yAxisID:'y' }
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ x:xAxis, y:peopleAxis } }
      });
    }
  </script>
</body>
</html>
